[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "module2-ocr"
version = "1.0.0"
description = "Core OCR engine for Document Digitizer System (Hybrid CRAFT + Vintern VLM)"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "opencv-python-headless==4.9.0.80",
  "numpy==1.26.4",
  "pillow",
  "pyyaml",
  "jsonschema",
  "torch",
  "torchvision",
  "transformers==4.42.3",
  "tokenizers",
  "accelerate",
  "einops",
  "timm",
  "sentencepiece",
  "tiktoken",
  "requests",
  "scipy",
  "gdown"
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::FutureWarning",
]

[project.scripts]
module2-ocr = "src.run:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
